<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150">
  <defs>
    <linearGradient id="adbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="300" height="150" rx="16" fill="url(#adbg)"/>
  <!-- TV Screen -->
  <rect x="90" y="25" width="120" height="80" rx="8" fill="rgba(255,255,255,0.3)"/>
  <rect x="98" y="33" width="104" height="64" rx="4" fill="rgba(0,0,0,0.2)"/>
  <text x="150" y="70" text-anchor="middle" font-size="28" fill="white">📺</text>
  <!-- Play button -->
  <circle cx="150" cy="70" r="24" fill="rgba(255,255,255,0.3)"/>
  <polygon points="144,60 144,80 164,70" fill="white"/>
  <!-- Text -->
  <text x="150" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="white">광고 보고 +10P 받기!</text>
  <!-- Stars -->
  <text x="20" y="40" font-size="20" fill="rgba(255,255,255,0.7)">⭐</text>
  <text x="262" y="50" font-size="16" fill="rgba(255,255,255,0.7)">✨</text>
  <text x="240" y="130" font-size="18" fill="rgba(255,255,255,0.6)">🎉</text>
</svg>
